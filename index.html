<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Clientes - CrudCrud</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h2>Cadastro de Clientes</h2>
        
        <form id="formCliente">
            <input type="text" id="nome" placeholder="Nome do Cliente" required>
            <input type="email" id="email" placeholder="E-mail do Cliente" required>
            <button type="submit">Cadastrar Cliente</button>
        </form>

        <hr>

        <h2>Clientes Cadastrados</h2>
        <ul id="listaClientes"></ul>
    </div>

    <script href="scripts.js" src="scripts.js"></script>
</body>
</html>
